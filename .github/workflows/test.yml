name: Test Docker Build & Push

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push to GHCR
        uses: ./
        with:
          image_name: test-docker-publish-ghcr
          tag: ''
          latest_tag: 'true'
          push: 'true'
