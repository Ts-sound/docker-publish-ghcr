name: 'Docker Build & Push to GHCR'
description: '一键构建 Docker 镜像并发布到 GitHub Packages (ghcr.io)'
author: 'Your GitHub Username'

inputs:
  image_name:
    description: '镜像名称 (格式：username/repo)'
    required: true
  tag:
    description: '镜像版本标签 (支持 git tag 自动检测)'
    required: false
    default: ''
  latest_tag:
    description: '是否附加 latest 标签'
    required: false
    default: 'true'
  docker_context:
    description: 'Docker 构建上下文目录'
    required: false
    default: '.'
  dockerfile:
    description: 'Dockerfile 路径'
    required: false
    default: 'Dockerfile'
  platforms:
    description: '构建平台 (逗号分隔)'
    required: false
    default: 'linux/amd64,linux/arm64'
  push:
    description: '是否推送镜像'
    required: false
    default: 'true'
  build_args:
    description: 'Docker 构建参数 (每行一个)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      shell: bash

    - name: Determine tag
      id: tag
      shell: bash
      run: |
        if [ -n "${{ inputs.tag }}" ]; then
          echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
        elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
      shell: bash

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      shell: bash

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: |
          ghcr.io/${{ inputs.image_name }}:${{ steps.tag.outputs.tag }}
          ${{ inputs.latest_tag == 'true' && format('ghcr.io/{0}:latest', inputs.image_name) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: ${{ inputs.build_args }}
      shell: bash

    # 2. 登录GHCR
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
      shell: bash

    # 3. 配置Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      shell: bash

    # 4. 构建+推送（内置缓存加速）
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.docker_context }}
        push: ${{ inputs.push }}
        tags: |
          ghcr.io/${{ inputs.image_name }}:${{ inputs.tag }}
          ${{ inputs.latest_tag == 'true' && format('ghcr.io/{0}:latest', inputs.image_name) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      shell: bash