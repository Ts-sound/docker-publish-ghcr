name: 'Docker Build & Push to GHCR'
description: 'Build Docker images and push to GitHub Packages (ghcr.io) with one click'
author: 'Ts-sound'

inputs:
  image_name:
    description: 'Image name (format: username/repo)'
    required: true
  tag:
    description: 'Image tag (supports auto-detection of git tags)'
    required: false
    default: ''
  latest_tag:
    description: 'Whether to add latest tag'
    required: false
    default: 'true'
  docker_context:
    description: 'Docker build context directory'
    required: false
    default: '.'
  dockerfile:
    description: 'Dockerfile path'
    required: false
    default: 'Dockerfile'
  platforms:
    description: 'Build platforms (comma-separated)'
    required: false
    default: ''
  push:
    description: 'Whether to push the image'
    required: false
    default: 'true'
  build_args:
    description: 'Docker build arguments (one per line)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Determine tag
      id: tag
      run: |
        if [ -n "${{ inputs.tag }}" ]; then
          echo "tag=${{ inputs.tag }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT
        elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag=${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Set up QEMU
      if: ${{ inputs.platforms != '' }}
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: |
          ghcr.io/${{ inputs.image_name }}:${{ steps.tag.outputs.tag }}
          ${{ inputs.latest_tag == 'true' && format('ghcr.io/{0}:latest', inputs.image_name) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: ${{ inputs.build_args }}
